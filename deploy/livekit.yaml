# LiveKit Server Configuration
# SFU server for mqvi voice/video chat.

port: 7880

rtc:
  # UDP port range — these ports must be opened on the firewall
  port_range_start: 50000
  port_range_end: 50200
  # Use the server's public IP (required when behind NAT)
  use_external_ip: true

# API key / secret — must match LIVEKIT_API_KEY and LIVEKIT_API_SECRET in .env
keys:
  devkey: secret

logging:
  level: info

audio:
  active_level: 45
  min_percentile: 30
  update_interval: 200
  smooth_intervals: 2
