# LiveKit server configuration
# https://docs.livekit.io/realtime/self-hosting/deployment/

port: 7880
rtc:
  # WebRTC UDP port range
  port_range_start: 50000
  port_range_end: 50030
  # TCP fallback (when UDP is blocked)
  tcp_port: 7881
  # Without this, LiveKit sends container internal IP as ICE candidate.
  # use_external_ip: true makes it use the host machine's IP instead.
  use_external_ip: true
  # Explicit node_ip for Docker Desktop (Windows/Mac) — use_external_ip
  # may resolve to WSL2 VM IP which is unreachable from the browser.
  node_ip: 127.0.0.1

keys:
  devkey: devsecret

logging:
  level: info

room:
  empty_timeout: 300  # 5 minutes
  max_participants: 50

audio:
  # Speaker detection sensitivity — higher = more sensitive to quiet voices
  # (dBov scale: 35 = -35dBov default, 45 = -45dBov catches softer speech)
  active_level: 45
  # Minimum % of audio samples that must exceed active_level (default 40)
  min_percentile: 30
  # How often the SFU sends ActiveSpeakersChanged events in ms (default 400)
  update_interval: 200
  # Number of intervals to smooth before reporting (default 2)
  smooth_intervals: 2

# Codec preferences (VP9, Opus, H264) are configured client-side, not here.
