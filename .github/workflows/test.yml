name: Tests

# Nothing ran the suites on push before this, so a branch could land with tests failing, a data race,
# or no tests at all and nobody would hear about it.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - run: go build ./...

      - run: go vet ./...

      # -race is the point of running these in CI at all: the WebSocket hub and the voice services
      # are concurrent, and a race is invisible on a developer machine that happens to schedule the
      # goroutines in a friendly order.
      - name: Test with the race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage floor
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          floor=$(cat coverage-floor.txt)
          echo "coverage: ${total}%  floor: ${floor}%"
          echo "Go coverage: **${total}%** (floor ${floor}%)" >> "$GITHUB_STEP_SUMMARY"
          # The floor only moves up, by editing coverage-floor.txt in the same change that earns it.
          awk -v t="$total" -v f="$floor" 'BEGIN { exit (t + 0.01 >= f) ? 0 : 1 }' || {
            echo "::error::coverage fell below the floor — add tests with the change, or justify lowering it explicitly"
            exit 1
          }

  client:
    name: Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      # tsc -b, not --noEmit: the latter skips project references and misses whole files.
      - run: npx tsc -b

      - run: npx vitest run
